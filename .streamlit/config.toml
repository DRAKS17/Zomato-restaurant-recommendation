# .streamlit/config.toml
# Streamlit server & theme for Zomato Recommender

[server]
headless            = true
enableCORS          = false
enableXsrfProtection = false
maxUploadSize       = 50

[browser]
gatherUsageStats = false

[theme]
primaryColor            = "#E23744"
backgroundColor         = "#080810"
secondaryBackgroundColor = "#0f0f1c"
textColor               = "#e2e2f0"
font                    = "sans serif"
